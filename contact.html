<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | AIML LABS</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" type="image/png" href="public/logo.png"/>

  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>

  <div class="preloader"><div class="preloader-text">INITIALIZING AIML</div></div>
  <canvas id="webgl-canvas"></canvas>

  <nav class="navbar">
    <a href="index.html" class="brand-group">
      <img src="public/logo.png" alt="AIML Labs Logo" class="nav-logo"/>
      <span class="brand-name">AIML LABS</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="industries.html">Industries</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <section class="section container" style="padding-top: 25vh;">
    <h1 class="display-huge" style="overflow: hidden;"><div class="split-line"><span class="gradient-text">ESTABLISH</span></div></h1>
    <h1 class="display-huge" style="overflow: hidden;"><div class="split-line">UPLINK</div></h1>
  </section>

  <section class="section container">
    <div class="grid-2">
      <!-- Address Block -->
      <div class="glass-panel" style="display:flex; flex-direction: column; justify-content: space-between;">
        <div>
          <h3 class="display-med" style="color: var(--accent-cyan); margin-bottom: 2vh;">HQ NODE</h3>
          <p class="text-body" style="font-size: 1.5rem;">
            #52, 3rd Cross, Aswath Nagar<br/>
            Marathahalli, Bengaluru<br/>
            Karnataka-560037
          </p>
        </div>
        <div style="margin-top: 5vh; border-top: 1px solid var(--glass-border); padding-top: 5vh;">
          <h3 class="display-med" style="color: var(--accent-purple); margin-bottom: 2vh;">COMMS</h3>
          <p class="text-body" style="font-size: 1.2rem; display: flex; flex-direction: column; gap: 1vh;">
            <a href="mailto:hr@ai-mllabs.com" style="color: var(--text);">hr@ai-mllabs.com</a>
            <a href="mailto:bharath@ai-mllabs.com" style="color: var(--text);">bharath@ai-mllabs.com</a>
            <a href="tel:7760309798" style="color: var(--accent-cyan);">+91 7760309798</a>
          </p>
        </div>
      </div>

      <!-- Secure Form -->
      <div class="glass-panel">
        <h3 class="display-med" style="margin-bottom: 4vh;">SECURE TRANSMISSION</h3>
        <form style="display: flex; flex-direction: column; gap: 3vh;">
          <input type="text" placeholder="IDENTIFIER (NAME)" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--glass-border); padding: 1rem 0; color: white; font-family: var(--font-display); font-size: 1rem; outline: none; transition: border-color 0.3s;"/>
          <input type="email" placeholder="RETURN NODE (EMAIL)" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--glass-border); padding: 1rem 0; color: white; font-family: var(--font-display); font-size: 1rem; outline: none; transition: border-color 0.3s;"/>
          <textarea rows="4" placeholder="ENCRYPTED PAYLOAD (MESSAGE)" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--glass-border); padding: 1rem 0; color: white; font-family: var(--font-display); font-size: 1rem; outline: none; transition: border-color 0.3s; resize: vertical;"></textarea>
          <div style="margin-top: 2vh;">
            <button type="button" class="magnetic-btn" style="width: 100%;">TRANSMIT DATA</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <h2 class="footer-large-text">AIML LABS</h2>
      <div class="footer-bottom">
        <div>© 2026 AIML LABS PVT LTD</div>
        <div style="display:flex; gap: 2vw;"><a href="#">Privacy</a><a href="#">Terms</a></div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
